name: Build & Push Docker images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  USERNAME: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: ./navyt-api
          push: true
          tags: ghcr.io/${{ env.USERNAME }}/navyt-api:latest

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: ./navyt-web
          push: true
          tags: ghcr.io/${{ env.USERNAME }}/navyt-web:latest